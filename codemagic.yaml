# Codemagic CI Configuration for Lensora Gallery X
workflows:
  android-workflow:
    name: Android Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        JAVA_VERSION: 17
    scripts:
      - name: Build Android Debug APK
        script: |
          chmod +x gradlew
          gradle assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
